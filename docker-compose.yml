version: '3.8'

services:
  mongo-db:
    image: mongo:7
    container_name: mflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mflow_user
      MONGO_INITDB_ROOT_PASSWORD: mflow_pass
    volumes:
      - mongo_data:/data/db
    networks:
      - mflow-net
    # Optional: only expose for debugging
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mflow-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      MONGO_URL: mongodb://mflow_user:mflow_pass@mongo-db:27017
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      WEBSERVICE_URL: ${WEBSERVICE_URL:-http://localhost:3000}
    depends_on:
      - mongo-db
    networks:
      - mflow-net
    # No port exposure if nginx fronts it; expose only for local testing
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: mflow-frontend
    restart: unless-stopped
    environment:
      API_URL: ${API_URL:-http://backend:3000}
    depends_on:
      - backend
    networks:
      - mflow-net
    ports:
      - "3001:3000"

volumes:
  mongo_data:

networks:
  mflow-net:
    driver: bridge